site_name: ZabbixNodes
site_description: Documentação da plataforma de gerenciamento multi-instância Zabbix
docs_dir: docs

theme:
  name: material
  language: pt-BR
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: red
      accent: red
      toggle:
        icon: material/weather-night
        name: Mudar para o modo escuro
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: red
      accent: red
      toggle:
        icon: material/weather-sunny
        name: Mudar para o modo claro
  features:
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - content.code.copy
    - content.code.annotate
    - search.suggest
    - search.highlight

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

plugins:
  - search

nav:
  - Início: index.md
  - Arquitetura: architecture.md
  - Desenvolvimento:
      - Ambiente local: development/local-setup.md
      - Backend: development/backend.md
      - Frontend: development/frontend.md
  - Deploy:
      - Docker: deploy/docker.md
      - Portainer: deploy/portainer.md
      - Variáveis de ambiente: deploy/environment.md
  - API:
      - Visão geral: api/overview.md
  - Changelog: changelog.md
